services:
  servicea:
    build:
      context: ./serviceA
    # UPDATED: Matches your ECR Repo URI
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-a:latest
    ports:
      - "3001:3001"
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin


  serviceb:
    build:
      context: ./serviceB
    # UPDATED: Matches your ECR Repo URI
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-b:latest
    ports:
      - "3002:3002"
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin

  # ... (Repeat the image naming pattern for Service B, C, D, E)
  servicec:
    build:
      context: ./serviceC
    # UPDATED: Matches your ECR Repo URI
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-c:latest
    ports:
      - "3003:3003"
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin




  serviced:
    build:
      context: ./serviceD
    # UPDATED: Matches your ECR Repo URI
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-d:latest
    ports:
      - "3004:3004"
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin



  servicee:
    build:
      context: ./serviceE
    # UPDATED: Matches your ECR Repo URI
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-e:latest
    ports:
      - "3005:3005"
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin
  frontend:
    build:
      context: ./frontend
    # UPDATED: Matches your ECR Repo URI
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest
    ports:
      - "3000:80"  # ALB talks to 3000 -> Container listens on 80
    networks:
      - appnet
    environment:
      - REACT_APP_SERVICE_A_URL=http://servicea:3001/serviceA
      - REACT_APP_SERVICE_B_URL=http://serviceb:3002/serviceB
      - REACT_APP_SERVICE_C_URL=http://servicec:3003/serviceC
      - REACT_APP_SERVICE_D_URL=http://serviced:3004/serviceD
      - REACT_APP_SERVICE_E_URL=http://servicee:3005/serviceE

      # ... (Rest of your envs)

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet
    # Note: On EC2, you usually don't need to expose 5432 to the world, 
    # but keeping it is fine for now.
    ports:
      - "5432:5432"

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
    driver: local