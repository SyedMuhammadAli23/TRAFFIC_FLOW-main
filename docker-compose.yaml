version: '3.8'

services:
  # --- Existing Application Services ---
  servicea:
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-a:latest
    ports: ["3001:3001"]
    networks: [appnet]
    depends_on: [postgres]
    environment:
      - DB_HOST=postgres
      - DB_PASS=${DB_PASSWORD}
      - SERVICE_B_URL=http://serviceb:3002/serviceb
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "service-a"

  serviceb:
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-b:latest
    ports: ["3002:3002"]
    networks: [appnet]
    depends_on: [postgres]
    environment:
      - DB_HOST=postgres
      - DB_PASS=${DB_PASSWORD}
      - SERVICE_C_URL=http://servicec:3003/servicec
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "service-b"

  servicec:
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-c:latest
    ports: ["3003:3003"]
    networks: [appnet]
    depends_on: [postgres]
    environment:
      - DB_HOST=postgres
      - DB_PASS=${DB_PASSWORD}
      - SERVICE_D_URL=http://serviced:3004/serviced
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "service-c"

  serviced:
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-d:latest
    ports: ["3004:3004"]
    networks: [appnet]
    depends_on: [postgres]
    environment:
      - DB_HOST=postgres
      - DB_PASS=${DB_PASSWORD}
      - SERVICE_E_URL=http://servicee:3005/servicee
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "service-d"

  servicee:
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/service-e:latest
    ports: ["3005:3005"]
    networks: [appnet]
    depends_on: [postgres]
    environment:
      - DB_HOST=postgres
      - DB_PASS=${DB_PASSWORD}
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "service-e"

  frontend:
    image: 522632170655.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest
    ports: ["3000:80"]
    networks: [appnet]
    environment:
      - REACT_APP_SERVICE_A_URL=http://alb-1054492390.ap-south-1.elb.amazonaws.com/servicea
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "frontend"

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [appnet]
    ports: ["5432:5432"]
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "traffic-flow-logs"
        awslogs-region: "ap-south-1"
        tag: "postgres"

  # --- Monitoring Stack Additions ---

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports: ["8080:8080"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [appnet]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # Limit storage to save space on t3.micro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.external-url=http://localhost:9090/prometheus/'
      - '--web.route-prefix=/'
    networks: [appnet]
    depends_on: [cadvisor]
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports: ["3100:3100"]
    networks: [appnet]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports: ["4000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${DB_PASSWORD}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [appnet]
    depends_on: [prometheus, loki]
    restart: unless-stopped

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

