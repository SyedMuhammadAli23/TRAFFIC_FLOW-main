name: CI/CD Traffic Flow (OIDC & Multi-Service)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 522632170655.dkr.ecr.ap-south-1.amazonaws.com
  # --- STEP 1: Put your actual ASG name here ---
  ASG_NAME: traffic-flow-asg 

jobs:
  ci-build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::522632170655:role/GitHub-OIDC-TrafficFlow-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push All Services
        run: |
          SERVICES=("service-a" "service-b" "service-c" "service-d" "service-e" "frontend")
          DIRS=("./serviceA" "./serviceB" "./serviceC" "./serviceD" "./serviceE" "./frontend")
          for i in "${!SERVICES[@]}"; do
            REPO_NAME=${SERVICES[$i]}
            DIR_PATH=${DIRS[$i]}
            FULL_IMAGE=${{ env.ECR_REGISTRY }}/$REPO_NAME:latest
            docker build -t $FULL_IMAGE $DIR_PATH
            # 2. Trivy Scan (Security Requirement)
            # We set --exit-code 0 so it reports but doesn't fail the build yet, 
            # OR set --exit-code 1 if you want to force security compliance.
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image --severity CRITICAL --exit-code 0 $FULL_IMAGE
            
            # 3. Push to ECR
            docker push $FULL_IMAGE
          done

      - name: Update SSM Docker Compose Blueprint
        run: |
          # Safety check: List files to the log so we can verify the path
          ls -R 
          
          # Use the correct .yaml extension
          aws ssm put-parameter \
            --name "/traffic-flow/config/docker-compose" \
            --value "$(cat docker-compose.yaml)" \
            --type "String" \
            --overwrite
  cd-deploy:
    needs: ci-build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::522632170655:role/GitHub-OIDC-TrafficFlow-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Rolling Update (Instance Refresh)
        run: |
          # Use the GITHUB env variable syntax here
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 360}'