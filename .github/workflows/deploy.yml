name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 522632170655.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  ci-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push all Images
        run: |
          # Service A
          docker build -t ${{ env.ECR_REGISTRY }}/service-a:latest ./serviceA
          docker push ${{ env.ECR_REGISTRY }}/service-a:latest
          
          # Service B
          docker build -t ${{ env.ECR_REGISTRY }}/service-b:latest ./serviceB
          docker push ${{ env.ECR_REGISTRY }}/service-b:latest

          # Service C
          docker build -t ${{ env.ECR_REGISTRY }}/service-c:latest ./serviceC
          docker push ${{ env.ECR_REGISTRY }}/service-c:latest

          # Service D
          docker build -t ${{ env.ECR_REGISTRY }}/service-d:latest ./serviceD
          docker push ${{ env.ECR_REGISTRY }}/service-d:latest

          # Service E
          docker build -t ${{ env.ECR_REGISTRY }}/service-e:latest ./serviceE
          docker push ${{ env.ECR_REGISTRY }}/service-e:latest

          # Frontend
          docker build -t ${{ env.ECR_REGISTRY }}/frontend:latest ./frontend
          docker push ${{ env.ECR_REGISTRY }}/frontend:latest
          
          # Note: Add Service B, C, D, E lines here following the same pattern

  cd-deploy-to-ec2:
    needs: ci-build-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to ECR on the EC2
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 522632170655.dkr.ecr.ap-south-1.amazonaws.com
            
            # 2. Navigate to your project folder
            cd ~/project
            
            # 3. Pull new images and restart containers
            docker compose pull
            docker compose up -d
            docker image prune -f