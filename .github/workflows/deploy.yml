name: CI/CD Traffic Flow (OIDC & Multi-Service)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"

jobs:
  ci-build-scan-push:
    runs-on: ubuntu-latest
    environment: production 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Scan & Push All Services
        run: |
          SERVICES=("service-a" "service-b" "service-c" "service-d" "service-e" "frontend")
          DIRS=("./serviceA" "./serviceB" "./serviceC" "./serviceD" "./serviceE" "./frontend")
          for i in "${!SERVICES[@]}"; do
            REPO_NAME=${SERVICES[$i]}
            DIR_PATH=${DIRS[$i]}
            FULL_IMAGE=${{ env.ECR_REGISTRY }}/$REPO_NAME:latest
            docker build -t $FULL_IMAGE $DIR_PATH
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image --severity CRITICAL --exit-code 0 $FULL_IMAGE
            docker push $FULL_IMAGE
          done

      - name: Update SSM Docker Compose Blueprint
        run: |
          aws ssm put-parameter \
            --name "/traffic-flow/config/docker-compose" \
            --value "$(cat docker-compose.yaml)" \
            --type "String" \
            --tier "Advanced" \
            --overwrite

  cd-deploy:
    needs: ci-build-scan-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Rolling Update (Instance Refresh)
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ vars.ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 360}'




