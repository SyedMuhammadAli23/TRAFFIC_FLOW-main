name: CI/CD Traffic Flow (OIDC & Multi-Service)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required for checkout

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 522632170655.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  ci-build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. OIDC Handshake (No Access Keys!)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::522632170655:role/GitHub-OIDC-TrafficFlow-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 2. Build & Scan Loop (Doing all 6 images)
      - name: Build, Scan & Push All Services
        run: |
          SERVICES=("service-a" "service-b" "service-c" "service-d" "service-e" "frontend")
          DIRS=("./serviceA" "./serviceB" "./serviceC" "./serviceD" "./serviceE" "./frontend")
          
          for i in "${!SERVICES[@]}"; do
            REPO_NAME=${SERVICES[$i]}
            DIR_PATH=${DIRS[$i]}
            FULL_IMAGE=${{ env.ECR_REGISTRY }}/$REPO_NAME:latest
            
            echo "--- Processing $REPO_NAME ---"
            
            # Build
            docker build -t $FULL_IMAGE $DIR_PATH
            
            # Trivy Scan (Senior's Requirement)
            # Fails the pipeline if Critical/High vulnerabilities are found
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image --severity CRITICAL,HIGH --exit-code 1 $FULL_IMAGE
            
            # Push
            docker push $FULL_IMAGE
          done

      # 3. CD Step: Sync the blueprint to SSM
      # This replaces the "SSH Action". The EC2 pulls this file automatically.
      - name: Update SSM Docker Compose Blueprint
        run: |
          aws ssm put-parameter \
            --name "/traffic-flow/config/docker-compose" \
            --value "$(cat docker-compose.yml)" \
            --type "String" \
            --overwrite

  # Note: In a production ASG setup, you might trigger an Instance Refresh here 
  # to make the EC2s pull the new images immediately.